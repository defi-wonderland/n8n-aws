# The manifest for the "n8n" service.
# Read the full specification for the "Load Balanced Web Service" type at:
#  https://aws.github.io/copilot-cli/docs/manifest/lb-web-service/

# Your service name will be used in naming your resources like log groups, ECS services, etc.
name: n8n
type: Load Balanced Web Service

# Distribute traffic to your service.
http:
  # Requests to this path will be forwarded to your service.
  # To match all requests you can use the "/" path.
  path: '/'
  # You can specify a custom health check path. The default is "/".
  healthcheck: '/healthz'
  # HTTPS domain alias
  alias: 'n8n.wonderland.xyz'
  # SSL certificate ARN - replace with your actual certificate ARN
  certificate_arn: 'arn:aws:acm:us-east-2:322507452057:certificate/3d3363ac-b71e-4d6c-8d5d-6a0797d1149f'

# Configuration for your containers and service.
image:
  # Using custom image with ffmpeg. To upgrade, rebuild and push to ECR
  location: '322507452057.dkr.ecr.us-east-2.amazonaws.com/n8n-app/n8n:latest'
  # Or use official image without ffmpeg:
  # location: 'docker.n8n.io/n8nio/n8n:latest'
  port: 5678

cpu: 512       # Number of CPU units for the task.
memory: 1024   # Amount of memory in MiB used by the task.
exec: true     # Enable running commands in your container.

network:
  vpc:
    enable_logs: true
    placement: 'private'

# Environment variables for n8n
variables:
  N8N_PORT: 5678
  NODE_ENV: production
  # Enable health check endpoint
  QUEUE_HEALTH_CHECK_ACTIVE: true

# Persistent storage for n8n data
storage:
  volumes:
    n8nData:
      path: /home/node/.n8n
      read_only: false
      efs:
        uid: 1000
        gid: 1000

# You can override any of the values defined above by environment.
environments:
  production:
    variables:
      N8N_HOST: n8n.wonderland.xyz
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.wonderland.xyz/
      GENERIC_TIMEZONE: Europe/Berlin
      N8N_PAYLOAD_SIZE_MAX: 16
      N8N_FORMDATA_FILE_SIZE_MAX: 500
      # Disable WAL mode for SQLite - EFS doesn't support it properly
      DB_SQLITE_ENABLE_WAL: false
      # Prune old execution data to prevent DB from growing unbounded
      EXECUTIONS_DATA_PRUNE: true
      EXECUTIONS_DATA_MAX_AGE: 720
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: 10000
    count:
      range:
        min: 1
        max: 3
      cpu_percentage: 70
      memory_percentage: 80